site_name: Recallm
site_description: Semantic caching for LLMs. Ask once, recall forever.
site_url: https://recallm.dev
repo_url: https://github.com/munimx/recallm
repo_name: munimx/recallm

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: recallm-dark
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: recallm-light
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  font:
    text: Plus Jakarta Sans
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Configuration: configuration.md
  - Storage backends: storage-backends.md
  - How it works: how-it-works.md
  - Observability: observability.md
  - Benchmarks: benchmarks.md
  - Contributing: contributing.md
  - Changelog: changelog.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

extra_css:
  - stylesheets/extra.css
